<html>
    <head>
        <title>todo list</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <style>
            .main{text-align: center;
                margin-top: 50px;
            }
            .list{
                text-align: center;
            }
            input{
                display: block;
                margin: auto;
            }
            .listbutton{
                display: block;
                margin: auto;
                margin-top: 10px;
            }
            .listitem li{
                display: block;
                text-align: center;
                padding: 5px;
                font-size: 20px;
                
            }
            .bb{
                margin: 6px;
                padding: 5px;
            }
            .cc{
                text-decoration: line-through;
                color: green;
            }
            .card{
                width: 500px;
                margin: auto;
                background-color: #d5d8d2f9;
                padding: 20px;
                text-align: center;
                font-family: sans-serif,'poppins';
                border-radius: 10px;
                box-shadow: 0px 0px 10px 0px #000000;

            }
            .btn{border-radius: 10px;
                padding: 5px;
                border:2px solid #000000;
                
            }
            .btn:hover{
                box-shadow: 0px 0px 10px 0px #000000;
                transform: scale(1.1);
            }
            input{padding: 10px;
                
            }
            
        </style>    
    </head>
    <body>
        <div class="main mx-3 my-3">
            <div class="card">

        <h1 class="list card-title">TODO LIST</h1>
        <div class="card-body">
        <ul class="listitem" id="todo">
        </ul>
        <input  class="list" type="text" id="data" placeholder="enter the todo list">
        <button  class="listbutton btn btn-danger btn-lg" id="btn">Add your task</button>
        


        <button class="listbutton btn btn-primary btn-lg" id="act">Active</button>
        
        
        <ul class="listitem" id="saved"></ul>

         <button class="listbutton btn btn-success btn-lg" id="com" >Completed</button>
        <ul class="listitem" id="complete"></ul>

    
    
        </div>
    </div>
        </div>
        
        
    <script>
        
        let btn=document.getElementById("btn");
        let data=document.getElementById("data");
        let todo=document.getElementById("todo");
        let complete=document.getElementById("complete");
        let list=[];
        let completedlist=localStorage.getItem("completed");
        let savedlist=localStorage.getItem("todo");
        window.onload=function(){
        saved();
        displaycomplete();}
        completedlist=JSON.parse(localStorage.getItem("completed"))||[];
        
       
        
        
        if (savedlist){
            list=JSON.parse(savedlist);
        }

       

        
        btn.addEventListener('click',(event)=>{
        if(data.value!=""){
            list.push(data.value);
            localStorage.setItem("todo", JSON.stringify(list));
          
            data.value="";
           saved();
        }
            
        }

        
        
       
        
        );
        function completed(id){
           // complete.innerHTML+='<li>'+list[id]+'</li>';
            completedlist.push(list[id]);
            document.getElementById(id).style.display="none";
            list.splice(id,1);
            localStorage.setItem("completed", JSON.stringify(completedlist));

            
    
            localStorage.setItem("todo", JSON.stringify(list));
            saved();

            displaycomplete();
            
        }
        function editTodo(id){
            let newtask=prompt("enter the new task",list[id]);
            if(newtask!="" && newtask!=null){
                list[id]=newtask;
                localStorage.setItem("todo", JSON.stringify(list));
                document.getElementById(id).innerHTML=newtask+'<button  class="bb btn btn-outline-warning" onclick="editTodo('+(id)+')">edit</button>'+'<button class="bb btn btn-outline-success" onclick="completed('+(id)+')"> Complete</button>'+'<button class="bb btn btn-outline-danger" onclick="deleteTodo('+(id)+')">delete</button>';
            }
            
        }
        function deleteTodo(id){
            list.splice(id,1);
            document.getElementById(id).style.display="none";;

            localStorage.setItem("todo", JSON.stringify(list))
            saved(); 
            
            
        }
        function saved(){
            
            
              
               let savedlist=JSON.parse(localStorage.getItem("todo"));
               document.getElementById("saved").innerHTML="";
               if(savedlist){
                for(let i=0;i<savedlist.length;i++){
                document.getElementById("saved").innerHTML+='<li class="btn btn-light btn-lg my-2" id="'+i+'">'+savedlist[i]+'<button class="bb btn  btn-lg btn-outline-warning" onclick="editTodo('+(i)+')">edit</button>'+'<button class="bb btn btn-lg btn-outline-danger" onclick="deleteTodo('+(i)+')">delete</button>'+'<button class="bb btn btn-outline-success" onclick="completed('+(i)+')"> Complete</button></li>';
                localStorage.setItem("todo", JSON.stringify(savedlist));
                
                }
                document.getElementById("act").innerText="Active tasks: "+savedlist.length;
            }
            
        
            else{
                document.getElementById("act").innerText="Active tasks: 0";
                document.getElementById("saved").innerHTML='<li>no saved tasks</li>';
            }
        }
        function displaycomplete(){
            let completedlist=JSON.parse(localStorage.getItem("completed"));
            if(completedlist){
                document.getElementById("complete").innerHTML="";

                for(let i=0;i<completedlist.length;i++){
                    document.getElementById("complete").innerHTML+='<li class="cc btn btn-lg btn-light my-3">'+completedlist[i]+'</li>';

                }
                document.getElementById("com").innerText="Completed tasks: "+completedlist.length;
                
            }
            else{
                document.getElementById("com").innerText="Completed tasks: 0";
                document.getElementById("complete").innerHTML='<li>no completed tasks</li>';
            }
        }
        
    
    </script>
    </body>
</html>
